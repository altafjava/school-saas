<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Grade Report</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
    <h2>Grade Report — {{examTitle}}</h2>
    <p>Dear Parent/Guardian,</p>
    <p>The grade report for <strong>{{studentName}}</strong> is now available.</p>
    <table style="border-collapse: collapse; width: 100%;">
        <tr style="background-color: #f2f2f2;">
            <th style="border: 1px solid #ddd; padding: 8px;">Subject</th>
            <th style="border: 1px solid #ddd; padding: 8px;">Marks</th>
            <th style="border: 1px solid #ddd; padding: 8px;">Grade</th>
        </tr>
        <tr>
            <td style="border: 1px solid #ddd; padding: 8px;">{{subject}}</td>
            <td style="border: 1px solid #ddd; padding: 8px;">{{marks}} / {{maxMarks}}</td>
            <td style="border: 1px solid #ddd; padding: 8px;">{{gradeLetter}}</td>
        </tr>
    </table>
    <br/>
    <p>Regards,<br/>{{schoolName}} Administration</p>
</body>
</html>
