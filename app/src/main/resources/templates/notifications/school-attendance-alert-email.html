<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Attendance Alert</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
    <h2>Attendance Alert</h2>
    <p>Dear Parent/Guardian,</p>
    <p>This is to inform you that <strong>{{studentName}}</strong> was marked
        <strong>{{attendanceStatus}}</strong> on <strong>{{attendanceDate}}</strong>
        in <strong>{{classroomName}}</strong>.</p>
    <p>If you believe this is an error, please contact the school administration.</p>
    <br/>
    <p>Regards,<br/>{{schoolName}} Administration</p>
</body>
</html>
