spring:
  datasource:
    url: jdbc:mariadb://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&useServerPrepStmts=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      pool-name: school-saas-prod-pool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:50}
      minimum-idle: ${DB_POOL_MIN_IDLE:15}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
      leak-detection-threshold: 30000
      validation-timeout: 5000
      register-mbeans: true
  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
        generate_statistics: false

app:
  security:
    jwt:
      private-key: ${JWT_PRIVATE_KEY}
      public-key: ${JWT_PUBLIC_KEY}
      key-id: ${JWT_KEY_ID:platform-key-1}
      expiration: ${JWT_EXPIRATION:900000}
      refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

platform:
  datasource:
    replica:
      enabled: ${DB_REPLICA_ENABLED:false}
      url: ${DB_REPLICA_URL:}
      username: ${DB_REPLICA_USERNAME:}
      password: ${DB_REPLICA_PASSWORD:}
      hikari:
        pool-name: school-saas-replica-pool
        maximum-pool-size: ${DB_REPLICA_POOL_MAX_SIZE:25}
        minimum-idle: ${DB_REPLICA_POOL_MIN_IDLE:5}
  security:
    encryption:
      key: ${PLATFORM_ENCRYPTION_KEY}

scheduler:
  thread-pool:
    thread-count: 20
  cluster:
    instance-id: AUTO

# API docs are disabled in production — Swagger exposes the full API surface.
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,liveness,readiness,prometheus
  endpoint:
    health:
      show-details: never
