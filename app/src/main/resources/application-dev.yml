spring:
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:school_saas}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      pool-name: school-saas-dev-pool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}

app:
  security:
    jwt:
      # Dev-only RSA-2048 key pair for RS256 JWT signing. Never use in production.
      private-key: 
      public-key: 
      key-id: platform-key-1
      expiration: 900000
      refresh-expiration: 604800000

platform:
  admin:
    # Dev-only: sets a known password so the bootstrap admin is predictable.
    # ADMIN_INITIAL_PASSWORD env var is read by SystemAdminBootstrapService at first startup.
    # If the admin already exists this has no effect — see reset instructions in README.
    initial-email: admin@platform.local
  security:
    encryption:
      key: 12345678901234567890123456789012

ADMIN_INITIAL_PASSWORD: Admin@Dev123!

security:
  swagger:
    public: true

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true

management:
  health:
    # ES 8.x reactive client sends `application/vnd.elasticsearch+json` which Spring's
    # reactive health indicator cannot parse — disabled in dev to avoid false DOWN status.
    dataelasticsearch:
      enabled: false
    elasticsearch:
      enabled: false
    # RabbitMQ and Redis are infrastructure services; disabled in dev so local startup
    # without all containers doesn't report a false DOWN.
    rabbit:
      enabled: false
  endpoint:
    health:
      show-details: always

sentry:
  enabled: false
  logging:
    enabled: false

application:
  storage:
    bucket-name: school-saas-dev
    region: us-east-1
    access-key: minioadmin
    secret-key: minioadmin
    endpoint: http://localhost:9003
