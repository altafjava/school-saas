spring:
  main:
    allow-bean-definition-overriding: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    contexts: shared
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
  rabbitmq:
    enabled: false
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://localhost:3306/school_test?createDatabaseIfNotExist=true
    username: root
    password: root
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

scheduler:
  datasource:
    url: jdbc:mariadb://localhost:3306/school_test
    username: root
    password: root
  cluster:
    instance-id: TEST_NODE
  thread-pool:
    thread-count: 2

logging:
  level:
    com.altafjava.school: DEBUG
    com.altafjava.platform: DEBUG
    org.springframework.security: DEBUG

management:
  health:
    redis:
      enabled: false
    elasticsearch:
      enabled: false

app:
  security:
    jwt:
      private-key: 
      public-key: 
      key-id: platform-key-1
      expiration: 900000
      refresh-expiration: 604800000

platform:
  security:
    encryption:
      key: 12345678901234567890123456789012

stripe:
  api:
    key: sk_test_dummy_key_for_testing

tenant:
  resolution:
    base-domain: school.local

application:
  storage:
    bucket-name: test-bucket
    region: us-east-1
    access-key: test-access-key
    secret-key: test-secret-key
    endpoint: http://localhost:4566
