plugins {
    id 'java-library'
}

dependencies {
    api project(':application')
    // Platform api — exposes Spring Web, validation, OpenAPI
    api 'com.altafjava.platform:api'

    // Spring Security and MapStruct are implementation-scoped in the platform's api module
    // so they are not transitively visible — declare them explicitly here
    implementation libs.spring.boot.starter.security
    implementation libs.mapstruct

    annotationProcessor libs.mapstruct.processor
    annotationProcessor libs.lombok.mapstruct.binding
    testImplementation libs.junit.jupiter.api
    testRuntimeOnly libs.junit.jupiter.engine
}

sourceSets {
    main {
        java {
            srcDir 'build/generated/sources/annotationProcessor/java/main'
        }
    }
}
