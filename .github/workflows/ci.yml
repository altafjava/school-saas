name: CI — Compile & Test

on:
  push:
    branches: [ "develop" ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'

permissions:
  contents: read
  checks: write
  pull-requests: write
  packages: read    # required to pull com.altafjava.platform:* from GitHub Packages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Compile & Test
    runs-on: self-hosted

    steps:
      - name: Checkout school-saas
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          PLATFORM_SAAS_TOKEN: ${{ secrets.PLATFORM_SAAS_TOKEN }}
        run: ./gradlew compileJava compileTestJava --build-cache

      - name: Test
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          PLATFORM_SAAS_TOKEN: ${{ secrets.PLATFORM_SAAS_TOKEN }}
          SPRING_PROFILES_ACTIVE: test
          STRIPE_API_KEY: sk_test_dummy_key_for_ci
        run: ./gradlew test --build-cache

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: '**/build/test-results/*/TEST-*.xml'

      - name: Archive Test Results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: test-results
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7

  auto-pr:
    name: Auto PR → main
    runs-on: self-hosted
    needs: build-and-test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - name: Create or update PR → main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"
          SUBJECT=$(printf '%s' "${{ github.event.head_commit.message }}" | head -1)
          TITLE="${BRANCH} → main: ${SUBJECT}"
          EXISTING=$(gh pr list --base main --head "${BRANCH}" --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            gh pr edit "$EXISTING" --title "$TITLE"
            echo "Updated PR #$EXISTING title to: $TITLE"
          else
            gh pr create \
              --base main \
              --head "${BRANCH}" \
              --title "$TITLE" \
              --body "Automated PR: all CI checks passed on \`${BRANCH}\`."
            echo "PR created: $TITLE"
          fi
