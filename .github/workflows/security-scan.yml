name: Security — OWASP Dependency Check

on:
  schedule:
    - cron: '0 2 * * 1'   # Every Monday at 02:00 UTC
  workflow_dispatch:        # Allow manual trigger at any time

permissions:
  contents: read
  packages: read   # required to resolve com.altafjava.platform:* from GitHub Packages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  owasp-scan:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Resolve NVD cache week key
        id: cache-date
        run: echo "week=$(date +%Y-%U)" >> $GITHUB_OUTPUT

      - name: Cache NVD database
        uses: actions/cache@v4
        with:
          path: ~/.gradle/dependency-check-data
          # Keyed by OS + ISO week: refreshes once per week to pick up new CVEs.
          # Falls back to the most recent prior-week entry on cache miss.
          key: nvd-${{ runner.os }}-${{ steps.cache-date.outputs.week }}
          restore-keys: |
            nvd-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: OWASP Dependency Check
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          PLATFORM_SAAS_TOKEN: ${{ secrets.PLATFORM_SAAS_TOKEN }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./gradlew dependencyCheckAggregate --build-cache

      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: dependency-check-report
          path: build/reports/dependency-check-report.html
          retention-days: 30
