# Infrastructure-only compose for local development.
# The Spring Boot app itself runs via ./gradlew :app:bootRun — not as a container.
# Start everything: docker compose up -d
# Stop everything:  docker compose down
# Wipe all data:    docker compose down -v

services:

  # ---------------------------------------------------------------------------
  # Database
  # ---------------------------------------------------------------------------
  mariadb:
    image: mariadb:11.2.2
    container_name: school_mariadb
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: mysql
      MARIADB_DATABASE: school_saas
    command: --lower-case-table-names=1
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - school-net

  # ---------------------------------------------------------------------------
  # Cache / session store / distributed locking
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: school_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - school-net

  # ---------------------------------------------------------------------------
  # Message broker
  # Management UI: http://localhost:15672  (guest / guest)
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: school_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - school-net

  # ---------------------------------------------------------------------------
  # Full-text search
  # ---------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: school_elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - school-net

  # ---------------------------------------------------------------------------
  # S3-compatible object storage (dev replacement for AWS S3)
  # Console UI: http://localhost:9001  (minioadmin / minioadmin)
  # API endpoint: http://localhost:9000
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: school_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - school-net

  # ---------------------------------------------------------------------------
  # Distributed tracing
  # UI: http://localhost:9411
  # ---------------------------------------------------------------------------
  zipkin:
    image: openzipkin/zipkin:3
    container_name: school_zipkin
    ports:
      - "9411:9411"
    networks:
      - school-net

  # ---------------------------------------------------------------------------
  # Metrics collection — scrapes the app's /actuator/prometheus endpoint
  # UI: http://localhost:9090
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: school_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - school-net

  # ---------------------------------------------------------------------------
  # Metrics dashboards
  # UI: http://localhost:3000  (admin / admin)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana-oss:10.3.1
    container_name: school_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - school-net

volumes:
  mariadb_data:
  redis_data:
  rabbitmq_data:
  es_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  school-net:
    driver: bridge
